services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_order_radar}
      POSTGRES_USER: ${POSTGRES_USER:-tg_order_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_order_radar}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_USER: ${POSTGRES_USER:-tg_order_radar}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
      TG_SESSION_DIR: /data/telegram-sessions
    volumes:
      - telegram_sessions:/data/telegram-sessions
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  collector:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_order_radar}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_USER: ${POSTGRES_USER:-tg_order_radar}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
      TG_SESSION_DIR: /data/telegram-sessions
    volumes:
      - telegram_sessions:/data/telegram-sessions
    command:
      - python
      - -m
      - celery
      - -A
      - app.workers.celery_app:celery_app
      - worker
      - -Q
      - telegram_collection
      - --loglevel=INFO

  worker:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_order_radar}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_USER: ${POSTGRES_USER:-tg_order_radar}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
      TG_SESSION_DIR: /data/telegram-sessions
    volumes:
      - telegram_sessions:/data/telegram-sessions
    command:
      - python
      - -m
      - celery
      - -A
      - app.workers.celery_app:celery_app
      - worker
      - -Q
      - source_validation,telegram_collection,message_processing,classification,duplicate_detection,notifications,maintenance
      - --loglevel=INFO

  beat:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_order_radar}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_USER: ${POSTGRES_USER:-tg_order_radar}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
    command:
      - python
      - -m
      - celery
      - -A
      - app.workers.celery_app:celery_app
      - beat
      - --loglevel=INFO

  bot:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_order_radar}
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_USER: ${POSTGRES_USER:-tg_order_radar}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "app.bot.main"]

volumes:
  postgres_data:
  redis_data:
  telegram_sessions:
