services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_order_radar}
      POSTGRES_USER: ${POSTGRES_USER:-tg_order_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

  collector:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-c", "import time; print('collector placeholder ready', flush=True); time.sleep(3600)"]

  worker:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-c", "import time; print('worker placeholder ready', flush=True); time.sleep(3600)"]

  bot:
    build:
      context: .
    env_file:
      - path: .env
        required: false
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-c", "import time; print('bot placeholder ready', flush=True); time.sleep(3600)"]

volumes:
  postgres_data:
  redis_data:
