name: Secret scanning guidance

# GitHub Advanced Security secret scanning should be enabled in repository settings.
# This workflow fails CI if common secret filenames are committed.

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Reject committed secrets and backups
        run: |
          set -euo pipefail
          patterns='\.env$|\.env\.production$|acme\.json|\.pem$|\.crt$|\.key$|\.session$|backups/|letsencrypt/'
          if git ls-files | grep -E "$patterns"; then
            echo "Forbidden secret/backup/cert paths are tracked by git." >&2
            exit 1
          fi
          echo "SECRET_PATH_GUARD_OK"
