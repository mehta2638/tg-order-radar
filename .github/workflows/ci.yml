name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: tg_order_radar
          POSTGRES_USER: tg_order_radar
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tg_order_radar -d tg_order_radar"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_DB: tg_order_radar
      POSTGRES_USER: tg_order_radar
      POSTGRES_PASSWORD: ci-password
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      API_KEY_ADMIN: ci-admin
      API_KEY_OPERATOR: ci-operator
      API_KEY_VIEWER: ci-viewer
      PROMETHEUS_ENABLED: "true"
      SEMANTIC_DEDUP_ENABLED: "false"
      ML_CLASSIFICATION_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install prometheus-client sentry-sdk
      - name: Ruff format
        run: python -m ruff format --check .
      - name: Ruff check
        run: python -m ruff check .
      - name: Mypy
        run: python -m mypy app
      - name: Alembic upgrade
        run: python -m alembic upgrade head
      - name: Pytest
        run: python -m pytest -q
      - name: Validate shell scripts
        run: bash scripts/validate_shell_scripts.sh
      - name: Compose config
        run: |
          docker compose config
          docker compose -f docker-compose.prod.yml --env-file .env.production.example config
          docker compose -f docker-compose.prod.yml -f docker-compose.prod.local.yml --env-file .env.production.example config

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build

  images:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build local compose images
        run: docker compose build
      - name: Build production compose images
        run: docker compose -f docker-compose.prod.yml --env-file .env.production.example build
